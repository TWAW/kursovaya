version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: it_audit_dev
      POSTGRES_USER: it_audit_user
      POSTGRES_PASSWORD: it_audit_pass123
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql+psycopg://it_audit_user:it_audit_pass123@db:5432/it_audit_dev
      SECRET_KEY: "change-me-in-prod"
      ADMIN_PASSWORD: "Admin@123"
      PORT: 8000
    ports:
      - "8000:8000"
    # В dev можно пробросить том с кодом, в prod — нельзя
    volumes:
      - .:/app

volumes:
  db_data:

